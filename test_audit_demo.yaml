meta:
  name: Audit de démonstration — Positionnel vs CSV
  version: '1.0'
sources:
  reference:
    format: dat
    label: Stock WMS — positionnel
    encoding: utf-8
    delimiter: ;
    has_header: false
    record_filter:
      marker: ^1
    fixed_width: true
    column_positions:
      - name: RecordType
        position: 0
        width: 1
      - name: Site
        position: 1
        width: 3
      - name: Depot
        position: 4
        width: 3
      - name: SKU
        position: 7
        width: 10
      - name: EAN
        position: 17
        width: 13
      - name: DateMvt
        position: 30
        width: 8
        type: date
        date_format: '%Y%m%d'
      - name: Qty
        position: 38
        width: 7
        type: integer
      - name: Statut
        position: 45
        width: 2
      - name: Classe
        position: 47
        width: 1
      - name: Type
        position: 48
        width: 4
      - name: Prix
        position: 52
        width: 7
        type: decimal
      - name: Poids
        position: 59
        width: 6
        type: decimal
  target:
    format: csv
    label: Stock export CSV
    encoding: utf-8
    delimiter: ;
    has_header: true
    fields:
      - name: sku
      - name: site
      - name: depot
      - name: ean
      - name: qty
        type: integer
      - name: statut
      - name: classe
      - name: type
      - name: date_mv_iso
        type: date
        date_format: '%Y-%m-%d'
      - name: prix
        type: decimal
      - name: poids
        type: decimal
join:
  keys:
    - source_field: SKU
      target_field: sku
filters:
  - field: Site
    source: reference
    values:
      - PAR
      - LYO
      - MAR
  - field: site
    source: target
    values:
      - PAR
      - LYO
      - MAR
rules:
  - name: Stock incohérent
    logic: AND
    rule_type: coherence
    fields:
      - source_field: Qty
        target_field: qty
        operator: <>
        tolerance: 0
  - name: Type valide
    logic: AND
    rule_type: coherence
    fields:
      - source_field: Type
        target_value: ELEC
  - name: Statut valide
    logic: AND
    rule_type: coherence
    fields:
      - source_field: Statut
        target_value: '00'
        normalize: trim
  - name: Prix cohérent
    logic: AND
    rule_type: coherence
    fields:
      - source_field: Prix
        target_field: prix
        tolerance: 0.05
  - name: EAN identique
    logic: AND
    rule_type: coherence
    fields:
      - source_field: EAN
        target_field: ean
        normalize: both
  - name: Contrôle intégrité AND
    logic: AND
    rule_type: coherence
    fields:
      - source_field: Qty
        target_field: qty
        tolerance: 0
      - source_field: Statut
        target_field: statut
        normalize: trim
  - name: Alerte OR (poids OU classe)
    logic: OR
    rule_type: coherence
    fields:
      - source_field: Poids
        target_field: poids
        tolerance: 0.1
      - source_field: Classe
        target_field: classe
        normalize: trim
  - name: Date mouvement identique
    logic: AND
    rule_type: coherence
    fields:
      - source_field: DateMvt
        target_field: date_mv_iso
  - name: Stock à 0 à la source
    logic: AND
    rule_type: coherence
    fields:
      - source_field: Qty
        target_value: '0'
report:
  show_matching: false
  max_diff_preview: 500
