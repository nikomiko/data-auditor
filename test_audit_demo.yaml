meta:
  name: Audit de démonstration — Positionnel vs CSV
  version: '1.0'
sources:
  reference:
    format: dat
    label: Stock WMS — positionnel
    encoding: utf-8
    delimiter: ;
    has_header: false
    record_filter:
      marker: ^1
    fixed_width: true
    column_positions:
      - name: RecordType
        position: 0
        width: 1
      - name: Site
        position: 1
        width: 3
      - name: Depot
        position: 4
        width: 3
      - name: SKU
        position: 7
        width: 10
      - name: EAN
        position: 17
        width: 13
      - name: DateMvt
        position: 30
        width: 8
        type: date
        date_format: '%Y%m%d'
      - name: Qty
        position: 38
        width: 7
        type: integer
      - name: Statut
        position: 45
        width: 2
      - name: Classe
        position: 47
        width: 1
      - name: Type
        position: 48
        width: 4
      - name: Prix
        position: 52
        width: 7
        type: decimal
      - name: Poids
        position: 59
        width: 6
        type: decimal
  target:
    format: csv
    label: Stock export CSV
    encoding: utf-8
    delimiter: ;
    has_header: true
    fields:
      - name: sku
      - name: site
      - name: depot
      - name: ean
      - name: qty
      - name: statut
      - name: classe
      - name: type
      - name: date_mv_iso
      - name: prix
      - name: poids
join:
  keys:
    - source_field: SKU
      target_field: sku
filters:
  - field: Site
    source: reference
    values:
      - PAR
      - LYO
      - MAR
  - field: site
    source: target
    values:
      - PAR
      - LYO
      - MAR
rules:
  - name: Stock incohérent
    logic: AND
    rule_type: incoherence
    fields:
      - source_field: Qty
        target_field: qty
        operator: differs
        tolerance: 0
  - name: Stocks identiques
    logic: AND
    rule_type: coherence
    fields:
      - source_field: Qty
        target_field: qty
        operator: equals
        tolerance: 0
  - name: Statut 00
    logic: AND
    rule_type: coherence
    fields:
      - source_field: Statut
        target_value: '00'
        operator: equals
      - source_field: Qty
        target_value: '50'
        operator: greater
  - name: Statut 01
    logic: AND
    rule_type: coherence
    fields:
      - source_field: Statut
        target_value: '01'
        operator: equals
      - source_field: Qty
        target_value: '50'
        operator: greater
report:
  show_matching: false
  max_diff_preview: 500
