meta:
  name: "Audit Catalogue produits — CSV → DAT positionnel"
  version: "1.0"

sources:
  reference:
    label: "Catalogue produits (référence CSV)"
    format: csv
    encoding: utf-8
    delimiter: ";"
    has_header: true
    fields:
      - {name: sku, type: string}
      - {name: designation, type: string}
      - {name: categorie, type: string}
      - {name: sous_categorie, type: string}
      - {name: prix_ht, type: decimal}
      - {name: taux_tva, type: decimal}
      - {name: poids_kg, type: decimal}
      - {name: stock_initial, type: integer}
      - {name: seuil_reappro, type: integer}
      - {name: date_creation, type: date, date_format: "%Y-%m-%d"}
      - {name: date_maj, type: date, date_format: "%Y-%m-%d"}
      - {name: statut, type: string}

  target:
    label: "Catalogue produits (cible DAT positionnel)"
    format: dat
    encoding: utf-8
    fixed_width: true
    column_positions:
      - name: sku
        position: 1
        width: 12
      - name: designation
        position: 13
        width: 38
      - name: categorie
        position: 51
        width: 14
      - name: sous_categorie
        position: 65
        width: 14
      - name: prix_ht
        position: 79
        width: 10
        type: decimal
      - name: taux_tva
        position: 89
        width: 6
        type: decimal
      - name: poids_kg
        position: 95
        width: 8
        type: decimal
      - name: stock_initial
        position: 103
        width: 6
        type: integer
      - name: seuil_reappro
        position: 109
        width: 5
        type: integer
      - name: date_creation
        position: 114
        width: 10
        type: date
        date_format: "%Y-%m-%d"
      - name: date_maj
        position: 124
        width: 10
        type: date
        date_format: "%Y-%m-%d"
      - name: statut
        position: 134
        width: 8

join:
  keys:
    - source_field: sku
      target_field: sku

rules:
  - name: "Designation"
    logic: AND
    rule_type: incoherence
    fields:
      - source_field: designation
        target_field: designation
        operator: differs
  - name: "Prix ht"
    logic: AND
    rule_type: incoherence
    fields:
      - source_field: prix_ht
        target_field: prix_ht
        operator: differs
        tolerance: 0
  - name: "Poids kg"
    logic: AND
    rule_type: incoherence
    fields:
      - source_field: poids_kg
        target_field: poids_kg
        operator: differs
        tolerance: 0
  - name: "Stock initial"
    logic: AND
    rule_type: incoherence
    fields:
      - source_field: stock_initial
        target_field: stock_initial
        operator: differs
  - name: "Seuil reappro"
    logic: AND
    rule_type: incoherence
    fields:
      - source_field: seuil_reappro
        target_field: seuil_reappro
        operator: differs
  - name: "Date maj"
    logic: AND
    rule_type: incoherence
    fields:
      - source_field: date_maj
        target_field: date_maj
        operator: differs
  - name: "Statut"
    logic: AND
    rule_type: incoherence
    fields:
      - source_field: statut
        target_field: statut
        operator: differs

report:
  show_matching: false
  max_diff_preview: 2000
